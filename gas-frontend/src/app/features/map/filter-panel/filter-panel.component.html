@if (!expanded()) {
  <button data-filter-pill (click)="toggleExpanded()"
          class="flex items-center gap-2 bg-slate-900/90 backdrop-blur border border-slate-700 rounded-full px-4 py-2 text-sm text-slate-300 hover:bg-slate-800 transition-colors shadow-lg">
    Filters
    @if (activeCount > 0) {
      <span class="bg-blue-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">{{ activeCount }}</span>
    }
  </button>
}

@if (expanded()) {
  <div data-filter-panel class="bg-slate-900/95 backdrop-blur border border-slate-700 rounded-2xl shadow-2xl p-5 w-72 flex flex-col gap-5">
    <div class="flex items-center justify-between">
      <span class="text-slate-200 font-semibold text-sm">Filters</span>
      <button data-close-btn (click)="toggleExpanded()" class="text-slate-500 hover:text-slate-300 text-lg leading-none">✕</button>
    </div>

    <div>
      <label class="text-xs font-semibold text-slate-400 uppercase tracking-widest block mb-2">Gas Type</label>
      <div class="flex gap-2">
        @for (gas of GAS_TYPES; track gas) {
          <button (click)="toggleGasType(gas)"
                  [class]="'flex-1 py-1.5 text-xs font-bold rounded-lg border bg-slate-800 hover:bg-slate-700 transition-colors text-slate-300 ' + (selectedGasTypes().has(gas) ? 'border-blue-500' : 'border-slate-700')">
            {{ gas }}
          </button>
        }
      </div>
    </div>

    <div>
      <label class="text-xs font-semibold text-slate-400 uppercase tracking-widest block mb-2">Date Range</label>
      <div class="flex flex-col gap-2">
        <input type="date" [value]="dateFrom()" (input)="dateFrom.set(onInputValue($event))"
               class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-slate-300 w-full" />
        <input type="date" [value]="dateTo()" (input)="dateTo.set(onInputValue($event))"
               class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-slate-300 w-full" />
      </div>
    </div>

    <div>
      <label class="text-xs font-semibold text-slate-400 uppercase tracking-widest block mb-1">
        Min Flux: {{ fluxMin().toLocaleString() }} kg/h
      </label>
      <input type="range" min="0" max="10000" step="100" [value]="fluxMin()"
             (input)="fluxMin.set(onInputNumber($event))"
             class="w-full accent-blue-500" />
    </div>

    <div class="flex gap-2 pt-1 border-t border-slate-800">
      <button data-reset-btn (click)="resetFilter()"
              class="flex-1 py-2 text-sm text-slate-400 hover:text-slate-200 border border-slate-700 rounded-lg transition-colors">Reset</button>
      <button data-apply-btn (click)="applyFilter()"
              class="flex-1 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors">Apply</button>
    </div>
  </div>
}
